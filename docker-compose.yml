services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: practix
      POSTGRES_PASSWORD: practix
      POSTGRES_DB: practix
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    depends_on:
      - db
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env.local

volumes:
  postgres_data:
